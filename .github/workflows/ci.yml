name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Hassfest Validation
        uses: home-assistant/actions/hassfest@master

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-homeassistant-custom-component

      - name: Run tests
        run: |
          pytest tests/

  release:
    name: Auto Release
    needs: [validate, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/meteo_grenoble/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Create Zip Archive
        run: |
          cd custom_components/meteo_grenoble
          zip -r ../../meteo_grenoble.zip .

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            Automatic release for version v${{ steps.get_version.outputs.VERSION }} of the Météo-Grenoble.com Home Assistant integration.
            
            ### Installation
            Download the `meteo_grenoble.zip` file below and extract it into your `custom_components/` directory, or use HACS.
          artifacts: "meteo_grenoble.zip"
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}
